# 爱快路由器4.0自动化测试配置文件

# 设备配置
device:
  ip: "10.66.0.150"
  username: "admin"
  password: "admin123"
  port: 80
  timeout: 30000

# 浏览器配置
browser:
  browser_type: "chromium"  # chromium, firefox, webkit
  headless: false
  slow_mo: 0
  timeout: 30000
  screenshot_on_failure: true
  video_on_failure: false

# 报告配置
report:
  output_dir: "reports/output"
  template_dir: "reports/templates"
  screenshot_dir: "reports/screenshots"
  report_name_prefix: "test_report"

# SSH后台验证配置
ssh:
  # 路由器SSH
  router:
    host: "10.66.0.150"
    username: "sshd"
    password: "ikuai8.com"
    port: 22
    # 控制台登录凭据（当SSH进入交互式菜单时自动登录）
    console_username: "whoami"
    console_password: "haohao!!xuexi@@tiantian##xiangshang"
  # Ubuntu测试客户端SSH
  client:
    host: "10.66.0.18"
    username: "iktest"
    password: "iktest"
    port: 22
  # iperf3测速服务器
  iperf3_server: "10.66.0.40"
  # iperf3测速参数
  iperf3_duration: 10  # 测速时长（秒）
  iperf3_tolerance: 0.20  # 允许的带宽误差（20%）

# 测试数据配置
test_data:
  # 导出文件存放目录（相对于项目根目录）
  export_dir: "test_data/exports"
  # 导入文件存放目录（相对于项目根目录）
  import_dir: "test_data/imports"
  # 各模块的导出文件名
  modules:
    vlan:
      export_filename: "vlan_config.csv"  # 导出格式为CSV（导入只支持CSV/TXT）
      import_filename: "vlan_import.csv"
    ip_rate_limit:
      export_filename: "ip_rate_limit_config.csv"
      import_filename: "ip_rate_limit_import.csv"
    mac_rate_limit:
      export_filename: "mac_rate_limit_config.csv"
      import_filename: "mac_rate_limit_import.csv"
    static_route:
      export_filename: "static_route_config.csv"
      import_filename: "static_route_import.csv"
    multi_wan_lb:
      export_filename: "multi_wan_lb_config.csv"
      import_filename: "multi_wan_lb_import.csv"
    protocol_route:
      export_filename: "protocol_route_config.csv"
      import_filename: "protocol_route_import.csv"
    port_route:
